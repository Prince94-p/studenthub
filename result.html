<!DOCTYPE html>
<html>
<head>
    <title>CHARUSAT Result Portal</title>
</head>

<body bgcolor="lightcyan">

<center>

<h1>CHARUSAT</h1>
<h2>Charotar University of Science and Technology</h2>
<h3>Student Result Portal</h3>

<form>

<table border="2" cellpadding="10">

<tr>
    <td><b>Academic Year</b></td>
    <td>
        <select>
            <option>2026-27</option>
            <option>2025-26</option>
            <option>2024-25</option>
        </select>
    </td>
</tr>

<tr>
    <td><b>Faculty</b></td>
    <td>
        <select>
            <option>Faculty of Technology & Engineering</option>
            <option>Faculty of Pharmacy</option>
            <option>Faculty of Management Studies</option>
            <option>Faculty of Computer Applications</option>
        </select>
    </td>
</tr>

<tr>
    <td><b>Department</b></td>
    <td>
        <select>
            <option>Computer Engineering</option>
            <option>Information Technology</option>
            <option>Computer Science & Engineering</option>
            <option>Electronics & Communication</option>
            <option>Mechanical Engineering</option>
            <option>Civil Engineering</option>
            <option>Electrical Engineering</option>
        </select>
    </td>
</tr>

<tr>
    <td><b>Semester</b></td>
    <td>
        <select>
            <option>Semester 1</option>
            <option>Semester 2</option>
            <option>Semester 3</option>
            <option>Semester 4</option>
            <option>Semester 5</option>
            <option>Semester 6</option>
            <option>Semester 7</option>
            <option>Semester 8</option>
        </select>
    </td>
</tr>

<tr>
    <td><b>Result Type</b></td>
    <td>
        <input type="radio" name="result"> Regular
        <input type="radio" name="result"> Reassessment
    </td>
</tr>

<tr>
    <td colspan="2" align="center">
        <input type="submit" value="View Result">
        <input type="reset" value="Clear">
    </td>
</tr>

</table>

</form>

<br>

<a href="dashboard.html">
    <button>Return</button>
</a>

</center>

</body>
</html>
