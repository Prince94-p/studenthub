<!DOCTYPE html>
<html>
<head>
    <title>Event Registration</title>
</head>

<body >

<center>

<h1>CHARUSAT</h1>
<h2>Event Registration</h2>

<p>Select the event you want to register for.</p>

<form action="dashboard.html">

<table border="1" cellpadding="10">

<tr>
    <td>Select Event</td>
    <td>
        <select>
            <option>Hackathon 2026</option>
            <option>Coding Contest</option>
            <option>Technical Quiz</option>
            <option>Project Exhibition</option>
            <option>Cultural Fest</option>
        </select>
    </td>
</tr>

<tr>
    <td>Participation Type</td>
    <td>
        <input type="radio" name="type"> Individual
        <input type="radio" name="type"> Team
    </td>
</tr>

<tr>
    <td>Remarks</td>
    <td>
        <textarea rows="4" cols="30" placeholder="Optional"></textarea>
    </td>
</tr>

<tr>
    <td colspan="2" align="center">
        <input type="submit" value="Register">
        <input type="reset" value="Clear">
    </td>
</tr>

</table>

</form>

<br>

<a href="dashboard.html">
    <button>Return</button>
</a>

</center>

</body>
</html>
